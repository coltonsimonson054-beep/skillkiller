name: SkillKiller
version: '1.0.0'
main: com.smp.skillkiller.SkillKillerPlugin
api-version: '26.2'
author: YourName
description: Killing a player permanently steals a level in a random skill.

commands:
  skills:
    description: View your or another player's skill levels.
    usage: /skills [player]
    permission: skillkiller.use
  skillsadmin:
    description: Admin controls for SkillKiller.
    usage: /skillsadmin <set|add|reset> <player> [skill] [amount]
    permission: skillkiller.admin
  skillmenu:
    description: Opens the skill point allocation menu, if you have unspent points.
    usage: /skillmenu
    permission: skillkiller.use

permissions:
  skillkiller.use:
    description: Allows viewing skill levels with /skills.
    default: true
  skillkiller.admin:
    description: Allows administering player skill levels.
    default: op
  skillkiller.exempt:
    description: Kills involving this player never transfer skill levels.
    default: false
